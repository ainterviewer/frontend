<!doctype html>
<html lang="en">
  <head>
    <title>AInterviewer - 502 Bad Gateway</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <!-- 3rd party resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab"
      rel="stylesheet"
    />
    <style>
      h3 {
        text-align: center;
      }

      body {
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      h1 {
        text-align: center;
        font-family: "Roboto Slab", serif;
        font-size: 50px;
        position: relative;
        display: block;
        margin: auto;
        margin-top: 4rem;
        margin-bottom: 2rem;
        width: fit-content;
      }

      .underline {
        position: relative;
        display: block;
        width: fit-content;
        z-index: 1;
      }

      .underline:after {
        background-size: 100% 100%;
        display: inline-block;
        width: 100%;
        height: 100px;
        position: absolute;
        bottom: -55px;
        content: " ";
        left: 0px;
        z-index: -1;
      }

      .underline-red:after {
        background-image: url("underline-red.svg");
      }
    </style>
  </head>
  <body>
    <div>
      <h1 class="underline underline-red">502 Bad Gateway</h1>
      <br />
      <h3>
        Oops! Our server is temporarily unavailable.
        <br />
        Please try again in a few minutes.
      </h3>
    </div>
  </body>
</html>
