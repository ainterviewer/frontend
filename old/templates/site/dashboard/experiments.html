<!doctype html>
<html lang="en">
	<head>
		<title>AInterviewer</title>
		<link rel="stylesheet" href="/static/css/dashboard.css" />
		{% include 'shared/head.html' %} {% include 'shared/shoelace.html' %}
		<style>
			.project {
				display: flex;
				justify-content: space-between;
				height: 30px;
			}
			.weight {
				input {
					width: 50px;
				}
			}

			.status {
				padding: 3px 8px;
				border-radius: 12px;
				font-size: 0.9em;
			}
			.status.running,
			.status.success {
				background-color: #c8e6c9;
				color: #2e7d32;
			}
			.status.stopped,
			.status.error {
				background-color: #ffcdd2;
				color: #c62828;
			}
			.status.starting,
			.status.pending,
			.status.stopping {
				background-color: #ffcc80;
				color: #e65100;
			}
			#error-message {
				color: #c62828;
				background-color: #ffcdd2;
				padding: 10px;
				border-radius: 3px;
				margin-top: 10px;
				display: none;
			}
			#loading-indicator {
				display: none;
				text-align: center;
				padding: 20px;
				color: #555;
			}
			.spinner {
				display: inline-block;
				width: 30px;
				height: 30px;
				border: 3px solid rgba(0, 0, 0, 0.1);
				border-radius: 50%;
				border-top-color: #007bff;
				animation: spin 1s ease-in-out infinite;
				margin-right: 10px;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			#retry-button {
				background-color: #007bff;
				color: white;
				border: none;
				padding: 8px 15px;
				border-radius: 4px;
				cursor: pointer;
				margin-left: 10px;
			}
			#instance-table tbody tr {
				cursor: pointer;
			}
			#instance-table tbody tr:hover {
				background-color: #f5f5f5;
			}
			th,
			td {
				padding: 10px 5px;
			}
			th:first-of-type,
			td:first-of-type {
				padding-left: 15px;
			}
			th:last-of-type,
			td:last-of-type {
				padding-right: 15px;
			}
		</style>
		<script src="/static/components/modal-form.js"></script>
	</head>
	<body>
		{% include 'shared/header.html' %} {% include 'shared/sidebar_main.html' %}
		<main>
			<div style="max-width: 80%">
				<h2 class="underline-simple">Experiments</h2>
				<div style="display: flex; align-items: end">
					<div class="btn-container">
						<div class="btn-item">
							<button
								id="create-experiment"
								class="action-btn"
								onclick="document.querySelector('#new-experiment-modal').open()"
								title="Create new experiment"
							>
								<i class="fa-solid fa-plus"></i>
							</button>
						</div>
					</div>
				</div>
				<table id="dashboard">
					<colgroup>
						<col style="width: 50px" />
						<col style="min-width: 100%" />
						<col style="width: 120px" />
						<col style="width: 120px" />
						<col style="width: 70px" />
					</colgroup>
					<thead>
						<tr>
							<th></th>
							<th>Experiment</th>
							<th>Status</th>
							<th style="text-align: center">Weights</th>
							<th></th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</div>
		</main>
		<script>
			const projects = getProjects();

			async function getProjects() {
				fetch('/api/projects')
					.then((response) => {
						if (!response.ok) {
							throw new Error('Failed to fetch projects');
						} else {
							return response.json();
						}
					})
					.then((data) => {
						data.forEach((project) => {
							let projectsContainer = document.querySelector('#projects-container');
							projectsContainer.innerHTML += `
                <div class="project">
                  <label><input type="checkbox" name="projects[]" value="${project.id}" />${project.title}</label>
                  <label class="weight">weight: <input type="number" name="weights[]" width="50px" value="" min="0" step="0.01" /></label>
                </div>
              `;
						});

						const checkboxes = document.querySelectorAll(
							'input[type="checkbox"][name="projects[]"]'
						);

						checkboxes.forEach((checkbox) => {
							// Initial state
							const projectDiv = checkbox.closest('.project');
							const weightLabel = projectDiv.querySelector('.weight');
							weightLabel.style.display = checkbox.checked ? 'block' : 'none';

							// Add event listener for changes
							checkbox.addEventListener('change', function () {
								weightLabel.style.display = this.checked ? 'block' : 'none';
								weightLabel.querySelector('input').value = this.checked ? '1' : '';
							});
						});
					});
			}

			async function getExperiments() {
				fetch('/api/experiments')
					.then((response) => {
						if (!response.ok) {
							throw new Error('Failed to fetch projects');
						} else {
							return response.json();
						}
					})
					.then((data) => {
						data.forEach((experiment) => {
							addRow(experiment);
						});
					});
			}

			function addRow(experiment) {
				table = document.querySelector('#dashboard tbody');
				row = table.insertRow(-1);
				row.dataset.id = experiment.id;

				icon = row.insertCell(0);
				project_title = row.insertCell(1);
				project_status = row.insertCell(2);
				weights = row.insertCell(3);
				menu = row.insertCell(4);

				icon.innerHTML = `
          <i class="fa-solid fa-vial"></i>
        `;
				project_title.innerHTML = experiment.title || experiment.id;
				project_status.innerHTML = `
          <span class="status ${experiment.status}">${experiment.status}</span>
        `;

				weights.innerHTML = experiment.weights.map((weight) => weight.toFixed(2)).join(' ');

				weights.classList.add(...['center']);

				menu.innerHTML = `
          <sl-dropdown>
            <sl-button slot="trigger"><i class="fa-solid fa-ellipsis-vertical"></i></sl-button>
            <sl-menu>
              <sl-menu-item onclick="copyExperiment(this)">
                <i class="fa-solid fa-copy" style="margin-right:5px"></i>
                Copy link
              </sl-menu-item>
              <sl-menu-item onclick="getExperimentQR(this)">
                <i class="fa-solid fa-qrcode" style="margin-right:5px"></i>
                QR code
              </sl-menu-item>
              <sl-menu-item onclick="editExperiment(this)">
                <i class="fa-solid fa-pen-to-square" style="margin-right:5px"></i>
                Edit
              </sl-menu-item>
              <sl-menu-item class="delete" onclick="deleteExperiments(this)">
                <i class="fa-solid fa-trash-can" style="margin-right:5px"></i>
                Delete
              </sl-menu-item>
            </sl-menu>
          </sl-dropdown>
        `;
			}

			function copyExperiment(element) {
				// Copy the text inside the text field
				let experiment_id = element.closest('tr').dataset.id;
				const experimentURL = window.location.origin + '/interview/redirect?id=' + experiment_id;
				navigator.clipboard.writeText(experimentURL);
			}

			function getExperimentQR(element) {
				let experiment_id = element.closest('tr').dataset.id;

				fetch(`/api/experiments/${experiment_id}/qr.png`)
					.then((response) => response.blob())
					.then((blob) => {
						const img = document.createElement('img');
						img.src = URL.createObjectURL(blob);
						img.height = 280;
						img.width = 280;
						document.querySelector('#qrcode').innerHTML = '';
						document.querySelector('#qrcode').appendChild(img);

						modal = document.querySelector('#experiment-qr-modal');
						modal.onclick = (e) => {
							navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
						};
						modal.open();
					});
			}

			async function createExperiment(data) {
				fetch('/api/experiments', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({
						title: data['experiment-name'],
						project_ids: data['projects'],
						weights: data['weights'].filter((weight) => weight !== '')
					})
				})
					.then((response) => {
						if (!response.ok) {
							throw new Error('Failed to create experiment');
						} else {
							return response.json();
						}
					})
					.then((experiment) => {
						addRow(experiment);
					});
			}
			function deleteExperiments(element) {
				modal = document.querySelector('#delete-experiment-modal');
				modal.querySelector("label[for='experiment-name'] > span").innerText = element
					.closest('tr')
					.querySelector('td:nth-child(2)').innerText;
				const experiment_id = element.closest('tr').dataset.id;
				modal.dataset.experimentId = experiment_id;

				modal.open();
			}

			getExperiments();
		</script>

		<modal-form id="new-experiment-modal" title="Create New Experiment" entity="Experiment">
			<div slot="modal-form-group" class="modal-form-group">
				<label for="experiment-name">Experiment title</label>
				<input type="text" name="experiment-name" required />
				<fieldset id="projects-container" required>
					<legend>Projects</legend>
				</fieldset>
			</div>
		</modal-form>

		<modal-form id="experiment-qr-modal" title="QR Code" button-verb="Copy" entity="code">
			<div id="qrcode" slot="modal-form-group"></div>
		</modal-form>

		<modal-form
			id="delete-experiment-modal"
			title="Delete Experiment"
			entity="Experiment"
			button-verb="Delete"
		>
			<div slot="modal-form-group" class="modal-form-group">
				<div>
					Are you sure you want to delete this experiment?
					<br />
					This action cannot be undone.
				</div>
				<br />
				<label for="experiment-name"> To confirm, type "<span></span>" in the box below </label>
				<input type="text" name="experiment-name" required />
			</div>
		</modal-form>
		<script>
			document.querySelector('#new-experiment-modal').addEventListener('modal-form-submit', (e) => {
				createExperiment(e.detail);
			});

			document
				.querySelector('#delete-experiment-modal')
				.addEventListener('modal-form-submit', (e) => {
					experiment_id = e.target.dataset.experimentId;

					fetch(`/api/experiments/${experiment_id}`, {
						method: 'DELETE',
						headers: {
							'Content-Type': 'application/json'
						}
					}).then((response) => {
						if (response.ok) {
							let notify = document.createElement('notification-popup');
							notify.setAttribute('success', '');
							notify.innerHTML = `
                <h2 slot="title">Success</h2>
                <div slot="body">
                  <p>Project <b>${e.detail['experiment-name']}</b> deleted.</p>
                </div>
              `;
							document.body.insertAdjacentElement('beforeend', notify);
							document.querySelector(`tr[data-id="${experiment_id}"]`).remove();
						}
					});
				});
		</script>
	</body>
</html>
