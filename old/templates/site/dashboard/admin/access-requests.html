<!doctype html>
<html lang="en">
	<head>
		<title>AInterviewer - Access Requests</title>
		<link rel="stylesheet" href="/static/css/dashboard.css" />
		{% include 'shared/head.html' %}
		<style>
			.status {
				padding: 3px 8px;
				border-radius: 12px;
				font-size: 0.9em;
				text-transform: capitalize;
			}
			.status.fulfilled {
				background-color: #c8e6c9;
				color: #2e7d32;
			}
			.status.error,
			.status.denied {
				background-color: #ffcdd2;
				color: #c62828;
			}
			.status.waiting {
				background-color: #ffcc80;
				color: #e65100;
			}
			#error-message {
				color: #c62828;
				background-color: #ffcdd2;
				padding: 10px;
				border-radius: 3px;
				margin-top: 10px;
				display: none;
			}
			#loading-indicator {
				display: none;
				text-align: center;
				padding: 20px;
				color: #555;
			}
			.spinner {
				display: inline-block;
				width: 30px;
				height: 30px;
				border: 3px solid rgba(0, 0, 0, 0.1);
				border-radius: 50%;
				border-top-color: #007bff;
				animation: spin 1s ease-in-out infinite;
				margin-right: 10px;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			#retry-button {
				background-color: #007bff;
				color: white;
				border: none;
				padding: 8px 15px;
				border-radius: 4px;
				cursor: pointer;
				margin-left: 10px;
			}
			#instance-table tbody tr {
				cursor: pointer;
			}
			#instance-table tbody tr:hover {
				background-color: #f5f5f5;
			}
			th,
			td {
				padding: 10px 5px;
				text-align: left;
				vertical-align: middle;
			}
			th:first-of-type,
			td:first-of-type {
				padding-left: 15px;
			}
			th:last-of-type,
			td:last-of-type {
				padding-right: 15px;
			}
		</style>
		<script>
			function rotateButton(button) {
				var currentRotation = parseInt(button.getAttribute('data-rotation-angle'), 10);
				var newRotation = currentRotation + 360;
				button.style.transform = 'rotate(' + newRotation + 'deg)';
				button.setAttribute('data-rotation-angle', newRotation);
			}
		</script>
	</head>
	<body>
		{% include 'shared/header.html' %} {% include 'shared/sidebar_admin.html' %}
		<main>
			<div style="max-width: 90%">
				<div style="display: flex; align-items: end">
					<h2 class="underline-simple">Access Requests</h2>
					<div class="btn-container">
						<div class="btn-item">
							<button
								class="action-btn"
								onclick="acceptSelected()"
								title="Accept selected requests"
							>
								<i class="fa-solid fa-circle-check"></i>
							</button>
						</div>
						<div class="btn-item">
							<button class="action-btn" onclick="denySelected()" title="Deny selected requests">
								<i class="fa-solid fa-ban"></i>
							</button>
						</div>
						<div class="btn-item">
							<button
								class="action-btn"
								id="refresh-button"
								data-rotation-angle="0"
								onclick="
									rotateButton(this);
									getRequests();
								"
								title="Refresh requests"
							>
								<i class="fa-solid fa-arrows-rotate"></i>
							</button>
						</div>
					</div>
				</div>
				<table id="instance-table">
					<colgroup>
						<col style="width: 50px" />
						<col style="width: 150px" />
						<col style="width: 220px" />
						<col style="width: 120px" />
						<col style="width: 100px" />
						<col style="width: auto" />
						<col style="width: 160px" />
						<col style="width: 160px" />
					</colgroup>
					<thead>
						<tr>
							<th>
								<input
									type="checkbox"
									id="select-all"
									onchange="toggleAllCheckboxes(this.checked)"
								/>
							</th>
							<th>Name</th>
							<th>Email</th>
							<th>Organization</th>
							<th>Status</th>
							<th>Message</th>
							<th>Created at</th>
							<th>Updated at</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
				<div id="error-message"></div>
				<div id="loading-indicator">
					<div class="spinner"></div>
					<span>Loading requests...</span>
					<button id="retry-button" style="display: none" onclick="getRequests()">Retry</button>
				</div>
			</div>
		</main>
		<script>
			let isLoading = false;
			const FETCH_TIMEOUT = 10000;

			function showLoading() {
				document.getElementById('loading-indicator').style.display = 'block';
				document.getElementById('retry-button').style.display = 'none';
				document.getElementById('instance-table').style.opacity = '0.5';
				document.getElementById('refresh-button').disabled = true;
				isLoading = true;
			}

			function hideLoading() {
				document.getElementById('loading-indicator').style.display = 'none';
				document.getElementById('instance-table').style.opacity = '1';
				document.getElementById('refresh-button').disabled = false;
				isLoading = false;
			}

			function showRetryButton() {
				document.getElementById('retry-button').style.display = 'inline-block';
			}

			async function getRequests() {
				if (isLoading) return;

				showLoading();
				hideError();

				try {
					const timeoutPromise = new Promise((_, reject) => {
						setTimeout(() => reject(new Error('Request timed out')), FETCH_TIMEOUT);
					});

					const response = await Promise.race([
						fetch(`/api/admin/access-requests`),
						timeoutPromise
					]);

					if (response.status === 401 || response.status === 403) {
						window.location.href = '/login';
						return;
					}

					if (!response.ok) {
						throw new Error(`Server responded with status ${response.status}`);
					}

					const data = await response.json();
					const tbody = document.querySelector('#instance-table tbody');
					tbody.innerHTML = '';

					data.forEach((request) => {
						const row = tbody.insertRow();
						const createdAt = new Date(request.created_at).toLocaleString();
						const updatedAt = new Date(request.updated_at).toLocaleString();

						row.innerHTML = `
              <td><input type="checkbox" class="instance-checkbox" data-request-id="${request.id}"></td>
              <td>${request.name}</td>
              <td>${request.email}</td>
              <td>${request.organization}</td>
              <td><span class="status ${request.status}">${request.status}</span></td>
              <td>${request.message}</td>
              <td>${createdAt}</td>
              <td>${updatedAt}</td>
            `;
						row.addEventListener('click', function (event) {
							if (event.target.type !== 'checkbox') {
								const checkbox = this.querySelector('.instance-checkbox');
								checkbox.checked = !checkbox.checked;
							}
							resetSelectAll();
						});
					});

					hideLoading();
				} catch (error) {
					hideLoading();
					showError('Failed to fetch access requests: ' + error.message);
					showRetryButton();
				}
			}

			function resetSelectAll() {
				const selectAllCheckbox = document.querySelector('#select-all');
				const allCheckboxes = document.querySelectorAll('.instance-checkbox');
				const allChecked =
					allCheckboxes.length > 0 && Array.from(allCheckboxes).every((cb) => cb.checked);
				selectAllCheckbox.checked = allChecked;
			}

			function toggleAllCheckboxes(checked) {
				document.querySelectorAll('.instance-checkbox').forEach((checkbox) => {
					checkbox.checked = checked;
				});
			}

			function getSelectedRequests() {
				return Array.from(document.querySelectorAll('.instance-checkbox:checked')).map(
					(checkbox) => checkbox.dataset.requestId
				);
			}

			async function processSelected(action) {
				const selectedIds = getSelectedRequests();
				if (selectedIds.length === 0) {
					alert(`Please select one or more requests to ${action}.`);
					return;
				}

				try {
					const response = await fetch(`/api/admin/access-requests/process`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({
							ids: selectedIds, // Note: these are emails, not numeric IDs
							action: action // 'approve' or 'deny'
						})
					});

					if (!response.ok) {
						const errorData = await response.json().catch(() => ({}));
						throw new Error(errorData.message || `Server responded with status ${response.status}`);
					}

					hideError();
					getRequests(); // Refresh the list
					document.getElementById('select-all').checked = false;
				} catch (error) {
					showError(`Failed to ${action} requests: ${error.message}`);
				}
			}

			async function acceptSelected() {
				await processSelected('approve');
			}

			async function denySelected() {
				await processSelected('deny');
			}

			function showError(message) {
				const errorElement = document.getElementById('error-message');
				errorElement.textContent = message;
				errorElement.style.display = 'block';
			}

			function hideError() {
				const errorElement = document.getElementById('error-message');
				errorElement.style.display = 'none';
			}

			document.addEventListener('DOMContentLoaded', function () {
				getRequests();
			});
		</script>
	</body>
</html>
