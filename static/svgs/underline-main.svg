<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50">
  <defs>
    <linearGradient id="waveGradient" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#196858" />
