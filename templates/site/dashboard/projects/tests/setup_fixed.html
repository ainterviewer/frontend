<html>
  <head>
    <title>AInterviewer</title>
    <link rel="stylesheet" href="/static/css/dashboard.css" />
    <link rel="stylesheet" href="/static/css/guide.css" />
    <style>
      .section {
        margin-bottom: 24px;
      }

      .section > div {
        display: flex;
        flex-direction: column;
        margin-top: 10px;
      }

      .section > span {
        font-style: italic;
      }

      input {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        flex: 1;
        width: 100%;
      }

      input[type="number"] {
        width: 70px;
        flex: initial;
      }

      button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .add-btn {
        background-color: #e6f3ff;
        color: #0066cc;
      }

      .remove-btn {
        background-color: #ffe6e6;
        color: #cc0000;
        padding: 8px;
      }

      h3 {
        color: #333;
        margin-bottom: 20px;
      }

      h4 {
        color: #666;
        margin-bottom: 10px;
        margin-top: 30px;
      }

      .plus-icon::before {
        content: "+";
        font-size: 18px;
        font-weight: bold;
      }

      .minus-icon::before {
        content: "×";
        font-size: 18px;
        font-weight: bold;
      }
    </style>
    {% include 'shared/head.html' %}
  </head>
  <body>
    {% include 'shared/header.html' %} {% include 'shared/sidebar_sub.html' %}
    <main>
      <div style="width: 80%; max-width: 1000px">
        <h2 class="underline-simple">Setup</h2>
        <h3>Fixed answers</h3>
        <p>Define fixed answers for each main question.</p>

        {% for question in questions %}
        <div class="section" id="question-{{loop.index}}-container">
          <h4>Main question {{loop.index}}</h4>
          <span type="text" id="question-{{loop.index}}">{{question}}</span>
          <div>
            <label for="question-{{loop.index}}-answer">Answer: </label>
            <input type="text" id="question-{{loop.index}}-answer" value="" />
          </div>
        </div>
        {% endfor %}
        <button onclick="saveSetup()">Save</button>
      </div>

      <script>
        const project_id = Cookies.get("project_id");
        const test_id = Cookies.get("test_id");
        if (!test_id) {
          window.location.href = "/dashboard/projects/tests";
        }

        function getAnswers() {
          fetch(`/api/projects/${project_id}/tests/${test_id}/fixed_answers`, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((response) => {
              if (!response.ok) {
                if (response.status === 307) {
                  return;
                }
                throw new Error("Failed to fetch setup");
              } else {
                return response.json();
              }
            })
            .then((data) => {
              console.log("Retrieved data:", data);
              // Populate the form with the retrieved data
              data.forEach((answer, index) => {
                const questionInput = document.getElementById(
                  `question-${index + 1}-answer`,
                );
                if (questionInput) {
                  questionInput.value = answer;
                }
              });
            })
            .catch((error) => {
              console.error("Error fetching setup:", error);
              let notify = document.createElement("notification-popup");
              notify.setAttribute("error", "");
              notify.innerHTML = `
                <h2 slot="title">Error</h2>
                <div slot="body">
                  <p>Failed to load setup data: ${error.message}</p>
                </div>
              `;
              document.body.insertAdjacentElement("beforeend", notify);
            });
        }

        // Call getSetup when the page loads
        document.addEventListener("DOMContentLoaded", getAnswers);

        function collectAnswers() {
          let answers = document.querySelectorAll('input[id^="question-"]');
          answers = [...answers].map((input) => {
            return input.value;
          });
          return answers;
        }

        function saveSetup() {
          data = collectAnswers();
          response = fetch(
            `/api/projects/${project_id}/tests/${test_id}/fixed_answers`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ answers: data }),
            },
          )
            // Add response body to the page
            .then((response) => {
              let notify = document.createElement("notification-popup");
              if (response.ok) {
                notify.setAttribute("success", "");
                notify.innerHTML = `
                  <h2 slot="title">Success</h2>
                  <div slot="body">
                    <p>Answers saved.</p>
                  </div>
                `;

                document.body.insertAdjacentElement("beforeend", notify);
                return response.json();
              } else {
                notify.setAttribute("error", "");
                notify.innerHTML = `
                  <h2 slot="title">Error</h2>
                  <div slot="body">
                    <p>Failed to save setup.</p>
                  </div>
                `;

                document.body.insertAdjacentElement("beforeend", notify);
                throw new Error("Failed to save setup");
              }

              console.log(notify);
            })
            .then((data) => {});
        }
      </script>
    </main>
  </body>
</html>
